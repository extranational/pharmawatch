version: '3.8'

services:
  # ─── PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pharma_user
      POSTGRES_PASSWORD: pharma_password
      POSTGRES_DB: pharmawatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma_user -d pharmawatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Task Queue + Cache) ─────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── LiteLLM Proxy (LLM Gateway) ───────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    command: ["--config", "/app/config.yaml"]

  # ─── Harvester Service ──────────────────────────────
  harvester:
    build:
      context: ./services/harvester
      dockerfile: ../../docker/python/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LITELLM_URL=http://litellm:4000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Orchestrator Service ───────────────────────────
  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: ../../docker/python/Dockerfile
    depends_on:
      - harvester
      - db
    environment:
      - REDIS_URL=redis://redis:6379/1
      - LITELLM_URL=http://litellm:4000
      - OUTPUT_DIR=/app/output
    volumes:
      - ./services/orchestrator:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── UI Backend (Bun/React) ─────────────────────────
  ui:
    build:
      context: ./services/ui
      dockerfile: ../node/Dockerfile
    depends_on:
      orchestrator:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://orchestrator:8000
    volumes:
      - ./services/ui:/app
    command: bun run dev

volumes:
  postgres_data:
  redis_data: